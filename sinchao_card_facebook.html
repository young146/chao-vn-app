<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1200px;height:628px;overflow:hidden}
body{background:#0B1A14;position:relative;font-family:'Noto Sans KR',sans-serif}

.atm{position:absolute;inset:0;z-index:0;
  background:radial-gradient(ellipse 58% 110% at 74% 50%, rgba(196,86,20,.26) 0%, transparent 65%);
}
.rightamber{
  position:absolute;right:0;top:0;bottom:0;width:440px;z-index:1;
  background:linear-gradient(270deg,#C45614 0%,rgba(196,86,20,.55) 48%,transparent 100%);
}

.wrap{position:absolute;inset:0;z-index:3;display:flex;align-items:center;padding:60px 80px;gap:72px}

/* Left column */
.left{flex:1;display:flex;flex-direction:column;justify-content:center;height:100%}
.logorow{display:flex;align-items:center;gap:16px;margin-bottom:42px}
.logo{width:54px;height:54px;border-radius:12px;overflow:hidden;flex-shrink:0}
.logo img{width:100%;height:100%;object-fit:cover}
.brandname{font-family:'Noto Serif KR',serif;font-weight:600;font-size:18px;color:#F5DEB3;letter-spacing:.04em;line-height:1.42}
.brandname span{display:block;font-size:12px;font-weight:300;opacity:.48;letter-spacing:.1em;font-family:'IBM Plex Mono',monospace;margin-top:3px}
.headline{font-family:'Noto Serif KR',serif;font-weight:700;font-size:40px;color:#F5DEB3;line-height:1.32;letter-spacing:-.015em;margin-bottom:26px}
.body{font-family:'Noto Sans KR',sans-serif;font-weight:300;font-size:17px;color:rgba(245,222,179,.58);line-height:1.88;letter-spacing:.005em}

/* Divider */
.vdiv{width:1px;height:210px;flex-shrink:0;background:linear-gradient(180deg,transparent,rgba(245,222,179,.14) 50%,transparent)}

/* Right column */
.right{width:330px;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:22px;flex-shrink:0}
.yearmono{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(245,222,179,.38);letter-spacing:.2em}
.ctabtn{font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:17px;color:#0B1A14;background:#F5DEB3;padding:16px 28px;border-radius:2px;line-height:1.5;letter-spacing:.03em}
.stacks{display:flex;flex-direction:column;gap:12px}
.storeitem{font-family:'IBM Plex Mono',monospace;font-size:13px;color:rgba(245,222,179,.42);letter-spacing:.07em;display:flex;align-items:center;gap:10px;border:1px solid rgba(245,222,179,.11);padding:11px 18px}
.dot{width:4px;height:4px;border-radius:50%;background:#C45614;flex-shrink:0}
</style>
