<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>씬짜오베트남 앱으로 이동</title>
  <meta name="description" content="씬짜오베트남 앱으로 바로 이동하거나 설치할 수 있습니다.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="씬짜오베트남 앱으로 이동">
  <meta property="og:description" content="앱이 설치되어 있으면 바로 열고, 없으면 스토어로 이동합니다.">
  <meta property="og:image" content="https://vnkorlife.com/logo.png">
  <meta property="og:url" content="https://chaovietnam.co.kr/go/app/">
  <style>
    :root {
      --brand: #ff6b35;
      --brand-dark: #e55d2a;
      --bg: #f7f8fb;
      --text: #222;
      --muted: #6b7280;
      --card: #fff;
      --line: #eceff3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(17, 24, 39, 0.08);
      padding: 22px 18px 18px;
    }
    .logo {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: block;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.35;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }
    .status {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #fff5f1;
      color: #8a3f22;
      font-size: 13px;
    }
    .btns { margin-top: 16px; display: grid; gap: 8px; }
    button, a.btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border: none;
      border-radius: 11px;
      height: 46px;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.2s ease;
    }
    button:active, a.btn:active { transform: scale(0.98); }
    .primary {
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
    }
    .line {
      color: #1f2937;
      background: #f3f4f6;
    }
    .small {
      margin-top: 10px;
      font-size: 12px;
      color: #9aa1ab;
      text-align: center;
    }
    .debug {
      margin-top: 12px;
      border: 1px dashed #d7dbe2;
      border-radius: 10px;
      background: #fafbfc;
      padding: 10px 12px;
      font-size: 12px;
      color: #475569;
      line-height: 1.55;
      word-break: break-all;
      display: none;
    }
    .debug.show { display: block; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="https://vnkorlife.com/logo.png" alt="씬짜오베트남" onerror="this.style.display='none'">
    <h1>씬짜오베트남 앱으로 이동 중입니다</h1>
    <p>앱이 설치되어 있으면 바로 열고, 설치되어 있지 않으면 앱스토어로 안내합니다.</p>
    <div class="status" id="status">자동으로 앱 실행을 시도하고 있습니다...</div>
    <div class="btns">
      <button class="primary" id="openBtn" type="button">앱으로 바로 열기</button>
      <a class="btn line" id="androidBtn" href="#" rel="noopener noreferrer">Android 설치하기</a>
      <a class="btn line" id="iosBtn" href="#" rel="noopener noreferrer">iPhone 설치하기</a>
    </div>
    <div class="debug" id="debugBox"></div>
    <div class="small">문제가 있으면 위 버튼을 직접 눌러주세요.</div>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var type = params.get("type") || "";
      var id = params.get("id") || "";
      var isDemo = params.get("demo") === "1";

      var APP_SCHEME = "chaovietnam://";
      var ANDROID_PACKAGE = "com.yourname.chaovnapp";
      var IOS_STORE = "https://apps.apple.com/us/app/id6754750793";

      var campaignQuery = params.toString();
      var playReferrer = encodeURIComponent(campaignQuery || "src=go_app");
      var ANDROID_STORE = "https://play.google.com/store/apps/details?id=" + ANDROID_PACKAGE + "&referrer=" + playReferrer;

      var deepLink = type && id ? APP_SCHEME + type + "/" + id : APP_SCHEME + "home";
      var statusEl = document.getElementById("status");
      var debugBox = document.getElementById("debugBox");

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      function renderDebug(intentUrl) {
        debugBox.classList.add("show");
        debugBox.innerHTML =
          "<b>Demo mode</b><br>" +
          "platform: " + (/(Android)/i.test(navigator.userAgent) ? "android" : /iPhone|iPad|iPod/i.test(navigator.userAgent) ? "ios" : "desktop") + "<br>" +
          "deeplink: " + deepLink + "<br>" +
          "android_store: " + ANDROID_STORE + "<br>" +
          "ios_store: " + IOS_STORE + "<br>" +
          (intentUrl ? "android_intent: " + intentUrl : "");
      }

      function openInApp() {
        var ua = navigator.userAgent || "";
        var isAndroid = /Android/i.test(ua);
        var isIOS = /iPhone|iPad|iPod/i.test(ua);

        setStatus("앱 실행을 시도하는 중입니다...");

        if (isAndroid) {
          var intentUrl =
            "intent://" + (type && id ? (type + "/" + id) : "home") +
            "#Intent;scheme=chaovietnam" +
            ";package=" + ANDROID_PACKAGE +
            ";S.browser_fallback_url=" + encodeURIComponent(ANDROID_STORE) +
            ";end";

          if (isDemo) {
            setStatus("Demo 모드: 자동 이동을 막았습니다. 아래 정보와 버튼으로 동작을 확인하세요.");
            renderDebug(intentUrl);
            return;
          }

          window.location.href = intentUrl;
          return;
        }

        if (isIOS) {
          if (isDemo) {
            setStatus("Demo 모드: 자동 이동을 막았습니다. 아래 정보와 버튼으로 동작을 확인하세요.");
            renderDebug("");
            return;
          }
          window.location.href = deepLink;
          setTimeout(function () {
            window.location.href = IOS_STORE;
          }, 1500);
          return;
        }

        setStatus("데스크탑 환경입니다. 설치 버튼을 사용해주세요.");
        if (isDemo) renderDebug("");
      }

      document.getElementById("openBtn").addEventListener("click", openInApp);
      document.getElementById("androidBtn").setAttribute("href", ANDROID_STORE);
      document.getElementById("iosBtn").setAttribute("href", IOS_STORE);

      if (isDemo) {
        setStatus("Demo 모드입니다. 자동 실행 없이 버튼으로만 테스트합니다.");
        openInApp();
      } else {
        openInApp();
      }
    })();
  </script>
</body>
</html>
