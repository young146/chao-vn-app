<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>씬짜오 베트남</title>
    <style>
        body {
            margin: 0;
            background: #FF6B35;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: s 0.8s linear infinite;
        }

        @keyframes s {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="spinner"></div>
    <script>
        (function () {
            var p = new URLSearchParams(location.search);
            var type = p.get('type') || 'danggn';
            var id = p.get('id') || '';

            var PACKAGE = 'com.yourname.chaovnapp';
            var IOS_STORE = 'https://apps.apple.com/us/app/id6754750793';

            // 앱 미설치 시 웹 상세 페이지 (플레이스토어 대신 웹으로!)
            var webDetail = id
                ? 'https://chaovietnam-login.web.app/view/?type=' + type + '&id=' + id
                : 'https://chaovietnam-login.web.app/';

            var ua = navigator.userAgent || '';
            var isAndroid = /Android/i.test(ua);
            var isIOS = /iPhone|iPad|iPod/i.test(ua);

            if (isAndroid) {
                // Intent URL: 앱 있으면 앱 열림, 없으면 webDetail로 이동
                location.href = 'intent://' + type + '/' + id
                    + '#Intent;scheme=chaovietnam'
                    + ';package=' + PACKAGE
                    + ';S.browser_fallback_url=' + encodeURIComponent(webDetail)
                    + ';end';
                // intent://는 HTTP 응답이 없어 브라우저가 계속 로딩 상태로 남음
                // → 앱이 열린 뒤 history.back()으로 카카오톡 채팅으로 복귀
                setTimeout(function () { history.back(); }, 300);

            } else if (isIOS) {
                location.href = 'chaovietnam://' + type + '/' + id;
                // 앱 없으면 custom scheme 실패 → 1.5초 후 웹으로
                setTimeout(function () { location.href = webDetail; }, 1500);

            } else {
                // 데스크탑 등
                location.href = webDetail;
            }
        })();
    </script>
</body>

</html>
