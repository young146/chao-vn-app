<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title id="page-title">씬짜오 구인구직 | 상세보기</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        #loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #BBDEFB;
            border-top-color: #1976D2;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #error-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px;
            text-align: center;
            gap: 12px;
        }

        #error-screen h2 {
            font-size: 18px;
            color: #333;
        }

        #error-screen p {
            font-size: 14px;
            color: #888;
        }

        #detail-screen {
            display: none;
            padding-bottom: 110px;
        }

        .top-header {
            background: linear-gradient(135deg, #1976D2, #42A5F5);
            color: #fff;
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(25, 118, 210, .3);
        }

        .top-header span {
            font-size: 16px;
            font-weight: 700;
        }

        .card {
            background: #fff;
            margin: 8px 0;
            padding: 20px 16px;
        }

        .badge-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
        }

        .badge-recruit {
            background: #1976D2;
        }

        .badge-seek {
            background: #7B1FA2;
        }

        .badge-industry {
            background: #42A5F5;
        }

        .badge-emp {
            background: #78909C;
        }

        .badge-done {
            background: #9E9E9E;
        }

        .item-title {
            font-size: 20px;
            font-weight: 700;
            color: #222;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .item-salary {
            font-size: 22px;
            font-weight: 700;
            color: #1976D2;
            margin-bottom: 10px;
        }

        .item-meta {
            font-size: 13px;
            color: #aaa;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }

        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 8px;
        }

        .info-item {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 12px;
        }

        .info-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .desc-text {
            font-size: 15px;
            color: #444;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .contact-icon {
            font-size: 20px;
        }

        .contact-val {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .seller-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .seller-avatar {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: linear-gradient(135deg, #1976D2, #42A5F5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .seller-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }

        .seller-sub {
            font-size: 12px;
            color: #aaa;
            margin-top: 2px;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #eee;
            padding: 12px 16px 28px;
            display: flex;
            gap: 10px;
        }

        .btn-app {
            flex: 1;
            background: linear-gradient(135deg, #1976D2, #42A5F5);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-store {
            background: #f5f5f5;
            color: #666;
            border: none;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="font-size:14px;color:#888">구인구직 정보를 불러오는 중...</p>
    </div>

    <div id="error-screen">
        <div style="font-size:52px">😢</div>
        <h2>게시물을 찾을 수 없습니다</h2>
        <p>삭제됐거나 존재하지 않는 게시물입니다.</p>
    </div>

    <div id="detail-screen">
        <div class="top-header">
            <span>💼 씬짜오 구인구직</span>
        </div>

        <div class="card">
            <div class="badge-row" id="badge-row"></div>
            <div class="item-title" id="item-title"></div>
            <div class="item-salary" id="item-salary"></div>
            <div class="item-meta" id="item-meta"></div>
        </div>

        <div class="card" id="info-card" style="display:none">
            <div class="section-title">📋 근무 정보</div>
            <div class="info-row" id="info-row"></div>
        </div>

        <div class="card">
            <div class="section-title">📝 상세 내용</div>
            <div class="desc-text" id="desc-text">내용이 없습니다.</div>
        </div>

        <div class="card" id="req-card" style="display:none">
            <div class="section-title">✅ 자격 요건</div>
            <div class="desc-text" id="req-text"></div>
        </div>

        <div class="card">
            <div class="section-title">👤 등록자</div>
            <div class="seller-row">
                <div class="seller-avatar">💼</div>
                <div>
                    <div class="seller-name" id="seller-name">등록자</div>
                    <div class="seller-sub">씬짜오 베트남 회원</div>
                </div>
            </div>
        </div>

        <div class="card" id="contact-card" style="display:none">
            <div class="section-title">📞 연락처</div>
            <div id="contact-list"></div>
        </div>
    </div>

    <div class="bottom-bar" id="bottom-bar" style="display:none">
        <button class="btn-app" onclick="openInApp()">🚀 앱에서 자세히 보기</button>
        <button class="btn-store" onclick="goStore()">앱 설치</button>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAAtT9gcu8eVQIhQxYEgBTGp2XZ6ghz_NU",
            authDomain: "chaovietnam-login.firebaseapp.com",
            projectId: "chaovietnam-login",
            storageBucket: "chaovietnam-login.firebasestorage.app",
            messagingSenderId: "249390849714",
            appId: "1:249390849714:web:95ae3e7f066b70ffe973ab",
        };
        const fbApp = initializeApp(firebaseConfig);
        const db = getFirestore(fbApp);

        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');
        const storeUrl = 'https://play.google.com/store/apps/details?id=com.yourname.chaovnapp';

        window.openInApp = function () {
            const ua = navigator.userAgent || '';
            const isAndroid = /Android/i.test(ua);
            if (isAndroid) {
                const intentUrl = `intent://job/${itemId}#Intent;scheme=chaovietnam;package=com.yourname.chaovnapp;S.browser_fallback_url=${encodeURIComponent(storeUrl)};end`;
                window.location.href = intentUrl;
            } else {
                window.location.href = `chaovietnam://job/${itemId}`;
            }
        };
        window.goStore = function () { window.open(storeUrl, '_blank'); };

        function formatDate(ts) {
            if (!ts) return '';
            let d = ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts);
            const diff = Date.now() - d;
            const m = Math.floor(diff / 60000), h = Math.floor(diff / 3600000), days = Math.floor(diff / 86400000);
            if (m < 1) return '방금 전';
            if (m < 60) return `${m}분 전`;
            if (h < 24) return `${h}시간 전`;
            if (days < 7) return `${days}일 전`;
            return d.toLocaleDateString('ko-KR');
        }

        async function load() {
            if (!itemId) { showError(); return; }
            try {
                const snap = await getDoc(doc(db, 'Jobs', itemId));
                if (!snap.exists()) { showError(); return; }
                render(snap.data());
            } catch (e) { console.error(e); showError(); }
        }

        function render(d) {
            document.getElementById('page-title').textContent = `${d.title || '구인구직'} | 씬짜오 구인구직`;

            // OG 태그 동적 삽입
            const setMeta = (prop, content) => {
                let el = document.querySelector(`meta[property='${prop}']`);
                if (!el) { el = document.createElement('meta'); el.setAttribute('property', prop); document.head.appendChild(el); }
                el.setAttribute('content', content);
            };
            setMeta('og:title', `${d.title || '구인구직'} | 씬짜오 구인구직`);
            setMeta('og:description', `${d.jobType || ''} | 💰 ${d.salary || '협의'} | 📍 ${d.city || ''}`);
            setMeta('og:image', 'https://chaovietnam-login.web.app/assets/icon.png');
            setMeta('og:url', window.location.href);

            // 배지
            const isHire = d.jobType === '구인';
            const status = d.status || '모집중';
            document.getElementById('badge-row').innerHTML =
                `<span class="badge ${isHire ? 'badge-recruit' : 'badge-seek'}">${d.jobType || '구인구직'}</span>${d.industry ? `<span class="badge badge-industry">${d.industry}</span>` : ''}${d.employmentType ? `<span class="badge badge-emp">${d.employmentType}</span>` : ''}`;

            document.getElementById('item-title').textContent = d.title || '';
            document.getElementById('item-salary').textContent = d.salary ? `💰 ${d.salary}` : '급여 협의';
            document.getElementById('item-meta').textContent =
                `${d.city || ''}${d.district ? ' · ' + d.district : ''} · ${formatDate(d.createdAt)}`;

            // 근무 정보
            const infoItems = [];
            if (d.city) infoItems.push({ label: '근무지', value: `${d.city}${d.district ? ' ' + d.district : ''}` });
            if (d.employmentType) infoItems.push({ label: '고용 형태', value: d.employmentType });
            if (d.deadline) infoItems.push({ label: '마감일', value: d.deadline });
            if (d.industry) infoItems.push({ label: '업종', value: d.industry });
            if (infoItems.length > 0) {
                const row = document.getElementById('info-row');
                infoItems.forEach(item => {
                    row.innerHTML += `<div class="info-item"><div class="info-label">${item.label}</div><div class="info-value">${item.value}</div></div>`;
                });
                document.getElementById('info-card').style.display = 'block';
            }

            // 상세 내용
            document.getElementById('desc-text').textContent = d.description || '내용이 없습니다.';

            // 자격 요건
            if (d.requirements) {
                document.getElementById('req-text').textContent = d.requirements;
                document.getElementById('req-card').style.display = 'block';
            }

            // 등록자
            document.getElementById('seller-name').textContent =
                d.userName || (d.userEmail ? d.userEmail.split('@')[0] : '등록자');

            // 연락처
            if (d.contact) {
                const list = document.getElementById('contact-list');
                list.innerHTML += `<div class="contact-item"><span class="contact-icon">📞</span><span class="contact-val">${d.contact}</span></div>`;
                document.getElementById('contact-card').style.display = 'block';
            }

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('detail-screen').style.display = 'block';
            document.getElementById('bottom-bar').style.display = 'flex';
        }

        function showError() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('error-screen').style.display = 'flex';
        }

        load();
    </script>
</body>

</html>
