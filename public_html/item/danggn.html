<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title id="page-title">씬짜오 나눔 | 중고거래 상세</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        #loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 16px;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #FFE0D0;
            border-top-color: #FF6B35;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #error-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px;
            text-align: center;
            gap: 12px;
        }

        #error-screen h2 {
            font-size: 18px;
            color: #333;
        }

        #error-screen p {
            font-size: 14px;
            color: #888;
        }

        #detail-screen {
            display: none;
            padding-bottom: 110px;
        }

        .top-header {
            background: linear-gradient(135deg, #FF6B35, #FF8E53);
            color: #fff;
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 10px;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(255, 107, 53, .3);
        }

        .top-header span {
            font-size: 16px;
            font-weight: 700;
        }

        .gallery {
            position: relative;
            background: #111;
        }

        .gallery-slides {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
        }

        .gallery-slides::-webkit-scrollbar {
            display: none;
        }

        .gallery-slide {
            flex-shrink: 0;
            width: 100%;
            scroll-snap-align: start;
        }

        .gallery-slide img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
        }

        .img-count {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, .6);
            color: #fff;
            border-radius: 12px;
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .no-image {
            height: 200px;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .no-image span {
            font-size: 52px;
        }

        .no-image p {
            font-size: 14px;
            color: #aaa;
        }

        .card {
            background: #fff;
            margin: 8px 0;
            padding: 20px 16px;
        }

        .badge-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
        }

        .badge-sale {
            background: #4CAF50;
        }

        .badge-adj {
            background: #FF9800;
        }

        .badge-sold {
            background: #9E9E9E;
        }

        .badge-cat {
            background: #FF6B35;
        }

        .item-title {
            font-size: 20px;
            font-weight: 700;
            color: #222;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .item-price {
            font-size: 22px;
            font-weight: 700;
            color: #FF6B35;
            margin-bottom: 10px;
        }

        .item-meta {
            font-size: 13px;
            color: #aaa;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }

        .desc-text {
            font-size: 15px;
            color: #444;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .contact-icon {
            font-size: 20px;
        }

        .contact-val {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .seller-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .seller-avatar {
            width: 44px;
            height: 44px;
            border-radius: 22px;
            background: linear-gradient(135deg, #FF6B35, #FF8E53);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .seller-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }

        .seller-sub {
            font-size: 12px;
            color: #aaa;
            margin-top: 2px;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #eee;
            padding: 12px 16px 28px;
            display: flex;
            gap: 10px;
        }

        .btn-app {
            flex: 1;
            background: linear-gradient(135deg, #FF6B35, #FF8E53);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-store {
            background: #f5f5f5;
            color: #666;
            border: none;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <p style="font-size:14px;color:#888">물품 정보를 불러오는 중...</p>
    </div>

    <div id="error-screen">
        <div style="font-size:52px">😢</div>
        <h2>게시물을 찾을 수 없습니다</h2>
        <p>삭제됐거나 존재하지 않는 게시물입니다.</p>
    </div>

    <div id="detail-screen">
        <div class="top-header">
            <span>🥗 씬짜오 나눔 | 중고거래</span>
        </div>

        <div class="gallery" id="gallery-wrap">
            <div class="gallery-slides" id="gallery-slides"></div>
            <div class="img-count" id="img-count" style="display:none"></div>
        </div>

        <div class="card">
            <div class="badge-row" id="badge-row"></div>
            <div class="item-title" id="item-title"></div>
            <div class="item-price" id="item-price"></div>
            <div class="item-meta" id="item-meta"></div>
        </div>

        <div class="card" id="location-card">
            <div class="section-title">📍 거래 지역</div>
            <div class="desc-text" id="location-text"></div>
        </div>

        <div class="card">
            <div class="section-title">📝 상세 설명</div>
            <div class="desc-text" id="desc-text">설명이 없습니다.</div>
        </div>

        <div class="card">
            <div class="section-title">👤 판매자</div>
            <div class="seller-row">
                <div class="seller-avatar">👤</div>
                <div>
                    <div class="seller-name" id="seller-name">판매자</div>
                    <div class="seller-sub">씬짜오 베트남 회원</div>
                </div>
            </div>
        </div>

        <div class="card" id="contact-card" style="display:none">
            <div class="section-title">📞 연락처</div>
            <div id="contact-list"></div>
        </div>
    </div>

    <div class="bottom-bar" id="bottom-bar" style="display:none">
        <button class="btn-app" onclick="openInApp()">🚀 앱에서 자세히 보기</button>
        <button class="btn-store" onclick="goStore()">앱 설치</button>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-app.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.14.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAAtT9gcu8eVQIhQxYEgBTGp2XZ6ghz_NU",
            authDomain: "chaovietnam-login.firebaseapp.com",
            projectId: "chaovietnam-login",
            storageBucket: "chaovietnam-login.firebasestorage.app",
            messagingSenderId: "249390849714",
            appId: "1:249390849714:web:95ae3e7f066b70ffe973ab",
        };
        const fbApp = initializeApp(firebaseConfig);
        const db = getFirestore(fbApp);

        const params = new URLSearchParams(window.location.search);
        const itemId = params.get('id');
        const storeUrl = 'https://play.google.com/store/apps/details?id=com.yourname.chaovnapp';

        window.openInApp = function () {
            const ua = navigator.userAgent || '';
            const isAndroid = /Android/i.test(ua);
            if (isAndroid) {
                const intentUrl = `intent://danggn/${itemId}#Intent;scheme=chaovietnam;package=com.yourname.chaovnapp;S.browser_fallback_url=${encodeURIComponent(storeUrl)};end`;
                window.location.href = intentUrl;
            } else {
                window.location.href = `chaovietnam://danggn/${itemId}`;
            }
        };
        window.goStore = function () { window.open(storeUrl, '_blank'); };

        function formatDate(ts) {
            if (!ts) return '';
            let d = ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts);
            const diff = Date.now() - d;
            const m = Math.floor(diff / 60000), h = Math.floor(diff / 3600000), days = Math.floor(diff / 86400000);
            if (m < 1) return '방금 전';
            if (m < 60) return `${m}분 전`;
            if (h < 24) return `${h}시간 전`;
            if (days < 7) return `${days}일 전`;
            return d.toLocaleDateString('ko-KR');
        }
        function formatPrice(price) {
            if (!price || price === 0) return '가격 협의 / 무료나눔';
            return Number(price).toLocaleString() + ' ₫';
        }
        function statusClass(s) {
            if (s === '판매중') return 'badge-sale';
            if (s === '가격 조정됨') return 'badge-adj';
            return 'badge-sold';
        }

        async function load() {
            if (!itemId) { showError(); return; }
            try {
                const snap = await getDoc(doc(db, 'XinChaoDanggn', itemId));
                if (!snap.exists()) { showError(); return; }
                render(snap.data());
            } catch (e) { console.error(e); showError(); }
        }

        function render(d) {
            document.getElementById('page-title').textContent = `${d.title || '물품'} | 씬짜오 나눔`;

            // 이미지
            const images = d.images || (d.imageUri ? [d.imageUri] : []);
            const slidesEl = document.getElementById('gallery-slides');
            if (images.length > 0) {
                images.forEach((url, i) => {
                    const slide = document.createElement('div');
                    slide.className = 'gallery-slide';
                    const img = document.createElement('img');
                    img.src = url; img.alt = `사진 ${i + 1}`;
                    img.onerror = () => slide.style.display = 'none';
                    slide.appendChild(img);
                    slidesEl.appendChild(slide);
                });
                if (images.length > 1) {
                    const cnt = document.getElementById('img-count');
                    cnt.style.display = 'block';
                    cnt.textContent = `1 / ${images.length}`;
                    slidesEl.addEventListener('scroll', () => {
                        const idx = Math.round(slidesEl.scrollLeft / slidesEl.clientWidth) + 1;
                        cnt.textContent = `${idx} / ${images.length}`;
                    });
                }
            } else {
                document.getElementById('gallery-wrap').innerHTML = '<div class="no-image"><span>📦</span><p>사진 없음</p></div>';
            }

            // 기본 정보
            const status = d.status || '판매중';
            document.getElementById('badge-row').innerHTML =
                `<span class="badge ${statusClass(status)}">${status}</span>${d.category ? `<span class="badge badge-cat">${d.category}</span>` : ''}`;
            document.getElementById('item-title').textContent = d.title || '';
            document.getElementById('item-price').textContent = formatPrice(d.price);
            document.getElementById('item-meta').textContent =
                `${d.city || ''}${d.district ? ' · ' + d.district : ''} · ${formatDate(d.createdAt)}`;

            // 위치
            const loc = [d.city, d.district, d.apartment && d.apartment !== '기타' ? d.apartment : null].filter(Boolean).join(' · ');
            if (loc) {
                document.getElementById('location-text').textContent = loc;
            } else {
                document.getElementById('location-card').style.display = 'none';
            }

            // 설명
            document.getElementById('desc-text').textContent = d.description || '설명이 없습니다.';

            // 판매자
            document.getElementById('seller-name').textContent =
                d.userName || (d.userEmail ? d.userEmail.split('@')[0] : '판매자');

            // 연락처
            const c = d.contact || {};
            if (c.phone || c.kakaoId || c.other) {
                const list = document.getElementById('contact-list');
                if (c.phone) list.innerHTML += `<div class="contact-item"><span class="contact-icon">📞</span><span class="contact-val">${c.phone}</span></div>`;
                if (c.kakaoId) list.innerHTML += `<div class="contact-item"><span class="contact-icon">💬</span><span class="contact-val">카카오: ${c.kakaoId}</span></div>`;
                if (c.other) list.innerHTML += `<div class="contact-item"><span class="contact-icon">📱</span><span class="contact-val">${c.other}</span></div>`;
                document.getElementById('contact-card').style.display = 'block';
            }

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('detail-screen').style.display = 'block';
            document.getElementById('bottom-bar').style.display = 'flex';
        }

        function showError() {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('error-screen').style.display = 'flex';
        }

        load();
    </script>
</body>

</html>
