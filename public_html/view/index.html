<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>씬짜오 - 상품 정보</title>

    <!-- OG / KakaoTalk 링크 카드용 메타태그 (JS로 동적 갱신됨) -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="씬짜오 (Xin Chao)">
    <meta property="og:title" id="og-title" content="씬짜오 - 상품 정보">
    <meta property="og:description" id="og-desc" content="Xin Chao 커뮤니티 게시글">
    <meta property="og:image" id="og-image" content="https://chaovietnam-login.web.app/icon.png">
    <meta property="og:url" id="og-url" content="">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', system-ui, sans-serif;
            background: #f0f2f5;
            color: #222;
            min-height: 100vh;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 14px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #eee;
            border-top-color: #FF6B35;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .header {
            background: linear-gradient(135deg, #FF6B35, #FF8E53);
            color: #fff;
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-inner {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            font-size: 22px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
        }

        .header-sub {
            font-size: 12px;
            opacity: 0.85;
        }

        .content {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 0 40px;
        }

        /* 이미지 갤러리 */
        .img-gallery {
            position: relative;
            background: #111;
        }

        .img-main {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
        }

        .img-thumbs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: #1a1a1a;
            overflow-x: auto;
        }

        .img-thumb-btn {
            width: 60px;
            height: 60px;
            flex-shrink: 0;
            border: 2px solid transparent;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        .img-thumb-btn.active {
            border-color: #FF6B35;
        }

        .img-thumb-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .img-count {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        /* 카테고리 뱃지 */
        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            margin: 14px 16px 0;
        }

        .cat-secondhand {
            background: #FF6B35;
        }

        .cat-realestate {
            background: #1565C0;
        }

        .cat-job-hire {
            background: #2E7D32;
        }

        .cat-job-seek {
            background: #6A1B9A;
        }

        .item-header {
            padding: 8px 16px 16px;
            border-bottom: 1px solid #eee;
        }

        .item-title {
            font-size: 20px;
            font-weight: 700;
            color: #111;
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .item-price {
            font-size: 22px;
            font-weight: 700;
            color: #FF6B35;
        }

        .item-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .meta-chip {
            background: #f5f5f5;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 13px;
            color: #555;
        }

        .section {
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #999;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .section-body {
            font-size: 15px;
            color: #333;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .location-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            color: #333;
        }

        .location-row .pin {
            font-size: 18px;
        }

        .contact-box {
            background: #fff;
            border: 1.5px solid #eee;
            border-radius: 14px;
            padding: 16px;
        }

        .contact-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .contact-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .contact-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        .contact-label {
            font-size: 12px;
            color: #aaa;
        }

        .contact-value {
            font-size: 15px;
            font-weight: 600;
            color: #222;
        }

        .contact-col {
            display: flex;
            flex-direction: column;
        }

        /* 날짜 */
        .footer-date {
            text-align: center;
            font-size: 12px;
            color: #ccc;
            padding: 20px 0;
        }

        /* 에러 */
        .error-box {
            text-align: center;
            padding: 60px 20px;
        }

        .error-box .error-emoji {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .error-box h2 {
            font-size: 18px;
            color: #555;
            margin-bottom: 8px;
        }

        .error-box p {
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>

<body>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <div style="font-size:14px;color:#aaa;">불러오는 중...</div>
    </div>

    <div id="app" style="display:none"></div>

    <!-- Firebase SDKs (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAAtT9gcu8eVQIhQxYEgBTGp2XZ6ghz_NU",
            authDomain: "chaovietnam-login.firebaseapp.com",
            projectId: "chaovietnam-login",
            storageBucket: "chaovietnam-login.firebasestorage.app",
            messagingSenderId: "249390849714",
            appId: "1:249390849714:web:34c894772258dad5e973ab"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const params = new URLSearchParams(location.search);
        const id = params.get('id');
        const col = params.get('col') || 'form_items'; // collection name

        function categoryInfo(data) {
            if (data.category === 'realestate') return { label: '🏠 부동산', cls: 'cat-realestate', color: '#1565C0' };
            if (data.jobMode === 'hire') return { label: '📢 구인 (직원 구합니다)', cls: 'cat-job-hire', color: '#2E7D32' };
            if (data.jobMode === 'seek') return { label: '🙋 구직 (일자리 구합니다)', cls: 'cat-job-seek', color: '#6A1B9A' };
            return { label: '🥕 당근 / 나눔', cls: 'cat-secondhand', color: '#FF6B35' };
        }

        function renderGallery(images) {
            if (!images || images.length === 0) return '';
            let thumbs = images.map((url, i) =>
                `<button class="img-thumb-btn ${i === 0 ? 'active' : ''}" onclick="switchImg(this,'${url}')" data-idx="${i}">
            <img src="${url}" loading="lazy">
        </button>`
            ).join('');
            return `<div class="img-gallery">
        <img class="img-main" id="img-main" src="${images[0]}" alt="상품 이미지">
        <div class="img-count">📷 ${images.length}</div>
        ${images.length > 1 ? `<div class="img-thumbs">${thumbs}</div>` : ''}
    </div>`;
        }

        window.switchImg = function (btn, url) {
            document.getElementById('img-main').src = url;
            document.querySelectorAll('.img-thumb-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        };

        function renderItem(data, id) {
            const cat = categoryInfo(data);
            const images = data.imageUrls || [];
            const ts = data.createdAt?.toDate?.();
            const dateStr = ts ? ts.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' }) : '';

            // OG 메타 업데이트 (KakaoTalk 캐시와 무관하게, 직접 접근 시 보임)
            document.title = (data.title || data.itemName || data.propName || data.jobTitle || '상품 정보') + ' | 씬짜오';
            if (images[0]) {
                document.getElementById('og-image').content = images[0];
                document.getElementById('og-title').content = document.title;
                document.getElementById('og-desc').content = data.description || data.desc || '';
                document.getElementById('og-url').content = location.href;
            }

            let titleText = data.itemName || data.propName || data.jobTitle || '상품 정보';
            let priceText = '';
            if (data.price) priceText = data.price;
            if (data.propPrice) priceText = data.propPrice;
            if (data.salary) priceText = data.salary;

            let metaChips = [];
            if (data.condition) metaChips.push(data.condition);
            if (data.propArea) metaChips.push(data.propArea);
            if (data.propRooms) metaChips.push(data.propRooms);
            if (data.propFloor) metaChips.push(data.propFloor);
            if (data.jobType) metaChips.push(data.jobType);
            if (data.dealType) metaChips.push(data.dealType);

            let locationParts = [data.city, data.district, data.address || data.detailAddr || data.locationDetail].filter(Boolean);
            let descText = data.description || data.desc || data.jobDesc || '';

            let contactRows = '';
            if (data.phone) contactRows += `<div class="contact-row"><span class="contact-icon">📞</span><div class="contact-col"><span class="contact-label">전화 / Zalo</span><span class="contact-value">${data.phone}</span></div></div>`;
            if (data.kakao) contactRows += `<div class="contact-row"><span class="contact-icon">💬</span><div class="contact-col"><span class="contact-label">카카오톡 ID</span><span class="contact-value">${data.kakao}</span></div></div>`;
            if (data.email) contactRows += `<div class="contact-row"><span class="contact-icon">✉️</span><div class="contact-col"><span class="contact-label">이메일</span><span class="contact-value">${data.email}</span></div></div>`;

            document.getElementById('app').innerHTML = `
        <div class="header">
            <div class="header-inner">
                <span class="header-logo">🇻🇳</span>
                <div>
                    <div class="header-title">씬짜오 (Xin Chao)</div>
                    <div class="header-sub">베트남 한인 커뮤니티</div>
                </div>
            </div>
        </div>
        <div class="content">
            ${renderGallery(images)}
            <span class="category-badge ${cat.cls}">${cat.label}</span>
            <div class="item-header">
                <div class="item-title">${titleText}</div>
                ${priceText ? `<div class="item-price">${priceText}</div>` : ''}
                ${metaChips.length ? `<div class="item-meta">${metaChips.map(c => `<span class="meta-chip">${c}</span>`).join('')}</div>` : ''}
            </div>
            ${locationParts.length ? `<div class="section"><div class="section-title">📍 위치</div><div class="location-row"><span class="pin">📍</span><span>${locationParts.join(' ')}</span></div></div>` : ''}
            ${descText ? `<div class="section"><div class="section-title">📝 상세 내용</div><div class="section-body">${descText}</div></div>` : ''}
            ${contactRows ? `<div class="section"><div class="section-title">📞 연락처</div><div class="contact-box">${contactRows}</div></div>` : ''}
            <div class="footer-date">${dateStr ? `등록일: ${dateStr}` : ''}</div>
        </div>
    `;
        }

        async function loadItem() {
            if (!id) {
                showError('잘못된 링크입니다', '올바른 링크를 통해 접속해주세요.');
                return;
            }
            try {
                const snap = await db.collection(col).doc(id).get();
                if (!snap.exists) { showError('게시글을 찾을 수 없습니다', '삭제됐거나 잘못된 링크입니다.'); return; }
                document.getElementById('loading').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                renderItem(snap.data(), snap.id);
            } catch (e) {
                showError('불러오기 실패', e.message);
            }
        }

        function showError(title, msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('app').innerHTML = `
        <div class="error-box">
            <div class="error-emoji">😕</div>
            <h2>${title}</h2>
            <p>${msg}</p>
        </div>`;
        }

        loadItem();
    </script>
</body>

</html>
