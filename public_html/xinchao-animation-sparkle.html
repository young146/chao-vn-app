<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XinChaoVietnam Sparkle Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0f0f13;
            overflow: hidden;
        }

        .container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .brand-text {
            font-family: 'Alex Brush', cursive;
            font-size: 8rem;
            color: transparent;
            background: linear-gradient(45deg, #d4af37, #f3e5ab, #d4af37);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            white-space: nowrap;
            /* Handwriting mask reveal effect */
            -webkit-mask-image: linear-gradient(to right, black 50%, rgba(0,0,0,0) 50%);
            -webkit-mask-size: 200% 100%;
            -webkit-mask-position: 100% 0;
            animation: 
                writeEffect 2.5s ease-in-out forwards,
                shimmerEffect 4s linear infinite;
        }

        .glow {
            position: absolute;
            top: 0; left: 0;
            font-family: 'Alex Brush', cursive;
            font-size: 8rem;
            color: transparent;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            white-space: nowrap;
            -webkit-mask-image: linear-gradient(to right, black 50%, rgba(0,0,0,0) 50%);
            -webkit-mask-size: 200% 100%;
            -webkit-mask-position: 100% 0;
            animation: writeEffect 2.5s ease-in-out forwards;
            pointer-events: none;
            z-index: -1;
        }

        /* The magical glowing tip of the pen */
        .sparkle-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .sparkle {
            position: absolute;
            top: 50%;
            left: 0; /* Starts at left boundary */
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #fff;
            box-shadow: 0 0 20px 10px rgba(255, 243, 204, 0.8), 0 0 40px 20px rgba(212, 175, 55, 0.6);
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: sparkleMove 2.5s ease-in-out forwards;
            z-index: 10;
        }

        /* Adding a bit of a tail/star shape to the sparkle */
        .sparkle::after, .sparkle::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
        .sparkle::after { width: 40px; height: 2px; }
        .sparkle::before { width: 2px; height: 40px; }

        @keyframes writeEffect {
            0% { -webkit-mask-position: 100% 0; }
            100% { -webkit-mask-position: 0% 0; }
        }

        @keyframes shimmerEffect {
            to { background-position: 200% center; }
        }

        @keyframes sparkleMove {
            0% {
                left: 0%;
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            10% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            30% { top: 40%; }
            50% { top: 60%; }
            70% { top: 45%; }
            90% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                left: 100%;
                top: 50%;
                opacity: 0;
                transform: translate(-50%, -50%) scale(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-text">XinChaoVietnam</div>
        <div class="glow">XinChaoVietnam</div>
        <div class="sparkle-container">
            <div class="sparkle"></div>
        </div>
    </div>
</body>
</html>
