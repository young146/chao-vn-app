<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>씬짜오 – 구인구직</title>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="씬짜오 (Xin Chao)">
  <meta property="og:title" content="씬짜오 – 구인구직 💼">
  <meta property="og:description" content="베트남 한인 구인구직 커뮤니티. 앱에서 더 많은 채용공고를 보세요!">
  <meta property="og:image" content="https://chaovietnam-login.web.app/icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
      background: #2196F3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .icon { font-size: 56px; }
    .title { font-size: 22px; font-weight: 900; }
    .sub { font-size: 14px; opacity: 0.85; line-height: 1.6; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .store-btns { display: flex; gap: 10px; margin-top: 4px; }
    .store-btn {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>
  <div class="icon">💼</div>
  <div class="title">씬짜오 구인구직</div>
  <div class="sub">앱을 여는 중입니다...<br>앱에서 더 많은 채용정보를 확인하세요!</div>
  <div class="spinner" id="spinner"></div>
  <div class="store-btns" id="store-btns" style="display:none">
    <a class="store-btn" href="https://play.google.com/store/apps/details?id=com.yourname.chaovnapp">▶ Play Store</a>
    <a class="store-btn" href="https://apps.apple.com/app/id6480538597">🍎 App Store</a>
  </div>

  <script>
    const ua = navigator.userAgent;
    const isAndroid = /Android/i.test(ua);
    const isIOS = /iPhone|iPad|iPod/i.test(ua);

    function tryClose() {
      try { window.location.href = 'kakaotalk://inappbrowser/close'; } catch(e) {}
      setTimeout(function() { try { window.close(); } catch(e) {} }, 300);
    }

    function openApp() {
      if (isAndroid) {
        window.location.href = 'intent://job#Intent;scheme=chaovietnam;package=com.yourname.chaovnapp;end';
      } else {
        window.location.href = 'chaovietnam://job';
      }
    }

    setTimeout(function () {
      openApp();

      setTimeout(function () {
        if (document.hidden) {
          tryClose();
        } else {
          document.getElementById('spinner').style.display = 'none';
          document.getElementById('store-btns').style.display = 'flex';
          if (isAndroid) {
            window.location.href = 'https://play.google.com/store/apps/details?id=com.yourname.chaovnapp';
          } else if (isIOS) {
            window.location.href = 'https://apps.apple.com/app/id6480538597';
          }
          setTimeout(tryClose, 800);
        }
      }, 1500);
    }, 100);
  </script>
</body>
</html>
