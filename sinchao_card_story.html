<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px;overflow:hidden}
body{background:#0B1A14;font-family:'Noto Sans KR',sans-serif;position:relative}

.bg-glow{position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 38% at 50% 10%, rgba(196,86,20,.4) 0%, transparent 55%),
    radial-gradient(ellipse 55% 35% at 50% 62%, rgba(196,86,20,.15) 0%, transparent 50%);}
.bg-amber{position:absolute;bottom:0;left:0;right:0;height:820px;z-index:1;
  background:linear-gradient(180deg,transparent 0%,rgba(196,86,20,.5) 40%,rgba(196,86,20,.88) 72%,#8C3608 100%);}

.wrap{position:absolute;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  padding:108px 80px 96px;text-align:center;}

/* 상단 브랜드 */
.topbrand{display:flex;align-items:center;gap:48px;flex-shrink:0;align-self:flex-start;}
.logo{width:180px;height:180px;border-radius:36px;overflow:hidden;flex-shrink:0;
  box-shadow:0 8px 40px rgba(0,0,0,.55);}
.logo img{width:100%;height:100%;object-fit:cover}
.brandinfo{display:flex;flex-direction:column;gap:18px;text-align:left;}
.brandname{font-family:'Noto Serif KR',serif;font-weight:700;font-size:72px;color:#F5DEB3;letter-spacing:.02em;}
.brandsub{font-family:'IBM Plex Mono',monospace;font-size:32px;color:rgba(245,222,179,.50);letter-spacing:.12em;}

/* 중단 콘텐츠 */
.content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;padding:60px 0 50px;}

.badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:14px;
  color:#C45614;letter-spacing:.3em;text-transform:uppercase;
  border:1px solid rgba(196,86,20,.45);padding:14px 36px;margin-bottom:72px;}

.headline{font-family:'Noto Serif KR',serif;font-weight:900;
  font-size:104px;color:#F5DEB3;line-height:1.18;letter-spacing:-.02em;
  margin-bottom:60px;width:100%;}

.hrule{width:80px;height:4px;
  background:linear-gradient(90deg,rgba(196,86,20,.3),#C45614,rgba(196,86,20,.3));
  border-radius:2px;margin-bottom:64px;}

.body{font-family:'Noto Sans KR',sans-serif;font-weight:400;
  font-size:56px;color:rgba(245,222,179,.82);
  line-height:1.78;letter-spacing:-.01em;width:100%;}

/* 하단 CTA */
.cta{flex-shrink:0;width:100%;}

.cta-btn{
  display:block;width:100%;
  font-family:'Noto Sans KR',sans-serif;font-weight:900;
  font-size:52px;line-height:1.4;letter-spacing:.01em;
  color:#1A0800;text-align:center;
  padding:54px 60px;border-radius:6px;margin-bottom:24px;
  position:relative;overflow:hidden;
  background:linear-gradient(115deg,#FAF0BC 0%,#ECC94B 30%,#D4831A 65%,#A84010 100%);
  box-shadow:0 16px 72px rgba(196,86,20,.7),
             0 2px 0 rgba(255,255,255,.28) inset,
             0 -3px 0 rgba(0,0,0,.22) inset;}
.cta-btn::before{content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(-50deg,
    rgba(255,255,255,.06) 0px,rgba(255,255,255,.06) 1px,
    transparent 1px,transparent 7px);pointer-events:none;}
.cta-sub{font-family:'IBM Plex Mono',monospace;font-size:26px;
  color:rgba(139,56,8,.72);letter-spacing:.08em;margin-top:6px;}

.stores{display:flex;gap:20px;width:100%;}
.store{flex:1;font-family:'IBM Plex Mono',monospace;font-size:24px;
  color:rgba(245,222,179,.65);letter-spacing:.07em;
  border:1px solid rgba(245,222,179,.2);padding:30px 20px;
  display:flex;align-items:center;justify-content:center;gap:14px;
  background:rgba(0,0,0,.2);}
.dot{width:9px;height:9px;border-radius:50%;background:#C45614;flex-shrink:0}
</style>
